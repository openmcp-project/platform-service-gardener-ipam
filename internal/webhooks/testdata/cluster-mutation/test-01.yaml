apiVersion: gardener.clusters.openmcp.cloud/v1alpha1
kind: IPAMConfig
metadata:
  name: ipam
spec:
  parentCIDRs:
    foo:
    - 10.27.0.0/16
  injectionRules:
  - id: test
    matchPurposes:
    - operator: ContainsAll
      values:
      - test
    injections:
    - path: .spec.network.cidr
      parents:
      - foo
      subnetSize: 28
